name: Auto Label GSSoC Approved

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  add-gssoc-approved-label:
    runs-on: ubuntu-latest
    steps:
      - name: Add gssoc approved label
        uses: actions/github-script@v7
        with:
          script: |
            const isPullRequest = context.eventName === 'pull_request_target';
            const issue_number = isPullRequest
              ? context.payload.pull_request.number
              : context.payload.issue.number;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['gssoc:approved'],
            });
